name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame numpy pytest

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest tests/ -q

  auto-pr:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      pull-requests: write
      contents: write
      actions: write

    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists, enable auto-merge, then dispatch APK build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh pr list --base main --head development --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            url=$(gh pr create \
              --base main \
              --head development \
              --title "development → main" \
              --body "Automated PR — CI passed.")
            pr="${url##*/}"
            echo "Created PR #$pr"
          else
            echo "Using existing PR #$pr"
          fi

          # Enable auto-merge; GitHub will merge when all required checks pass.
          # --auto fails with "unstable status" if the PR check hasn't registered
          # yet — that's fine, we retry and fall back to || true.
          for i in $(seq 1 6); do
            state=$(gh pr view "$pr" --json statusCheckRollup --jq '.statusCheckRollup // [] | map(select(.context=="test")) | .[0].state // "PENDING"')
            echo "Check state: $state (attempt $i)"
            if [ "$state" = "SUCCESS" ]; then
              gh pr merge "$pr" --squash --auto && break
            elif [ "$state" = "FAILURE" ] || [ "$state" = "ERROR" ]; then
              echo "Required check failed — not merging"
              exit 1
            fi
            sleep 10
          done
          if [ "$state" != "SUCCESS" ]; then
            echo "Check not yet complete — enabling auto-merge"
            gh pr merge "$pr" --squash --auto || true
          fi

          # GITHUB_TOKEN merges do NOT trigger push events on main, so the
          # android.yml workflow_dispatch must be fired explicitly here.
          # Poll up to 3 minutes for the PR to actually merge, then dispatch.
          echo "Waiting for PR #$pr to merge…"
          for i in $(seq 1 18); do
            merged=$(gh pr view "$pr" --json state --jq '.state')
            if [ "$merged" = "MERGED" ]; then
              echo "PR merged — dispatching APK build"
              gh workflow run android.yml --ref main
              break
            fi
            echo "PR state: $merged (attempt $i)"
            sleep 10
          done
          if [ "$merged" != "MERGED" ]; then
            echo "PR not yet merged after 3 min — APK build must be triggered manually"
          fi
