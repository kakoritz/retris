name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame numpy pytest

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest tests/ -q

  auto-pr:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Open PR if none exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh pr list --base main --head development --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh pr create \
              --base main \
              --head development \
              --title "development → main" \
              --body "Automated PR — CI passed. Review and merge when ready."
          else
            echo "PR #$existing already open, skipping."
          fi
