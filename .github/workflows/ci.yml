name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygame numpy pytest

      - name: Run tests
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: python -m pytest tests/ -q

  auto-pr:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create PR if none exists, then squash-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr=$(gh pr list --base main --head development --json number --jq '.[0].number')
          if [ -z "$pr" ]; then
            url=$(gh pr create \
              --base main \
              --head development \
              --title "development → main" \
              --body "Automated PR — CI passed.")
            pr="${url##*/}"
            echo "Created PR #$pr"
          else
            echo "Using existing PR #$pr"
          fi
          # Wait up to 60 s for the PR's required status check to register,
          # then enable auto-merge (GitHub merges it once checks pass).
          for i in $(seq 1 6); do
            state=$(gh pr view "$pr" --json statusCheckRollup --jq '.statusCheckRollup // [] | map(select(.context=="test")) | .[0].state // "PENDING"')
            echo "Check state: $state (attempt $i)"
            if [ "$state" = "SUCCESS" ]; then
              gh pr merge "$pr" --squash --auto
              break
            elif [ "$state" = "FAILURE" ] || [ "$state" = "ERROR" ]; then
              echo "Required check failed — not merging"
              exit 1
            fi
            sleep 10
          done
          # If check hasn't appeared yet, enable auto-merge and let it fire when ready
          if [ "$state" != "SUCCESS" ]; then
            echo "Check not yet complete — enabling auto-merge"
            gh pr merge "$pr" --squash --auto || true
          fi
